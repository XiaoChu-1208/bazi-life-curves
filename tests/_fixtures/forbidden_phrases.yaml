# 用户可见文案中禁止出现的措辞 — 守 AGENTS.md §4.3 fairness 铁律。
#
# 这些词被禁是因为它们:
#   - 把伴侣物化为"被克者 / 受益者"(克夫/旺夫/妨夫/妨妻)
#   - 把性别预设进打分(男看财女看官)
#   - 隐含价值判断"配偶星弱 = 单身 = 差"
#
# 扫描范围:
#   - templates/*.j2          (HTML 模板)
#   - examples/*.md           (面向用户的解读样例)
#   - examples/*.analysis.json (LLM analysis 文本字段)
#
# 如果在 references/*.md / scripts/*.py 注释里讨论"为什么不能用",
# 那是合规的,本规则只检查【实际渲染给用户的文案】。

forbidden_phrases:
  - "克夫"
  - "旺夫"
  - "妨夫"
  - "妨妻"
  - "克妻"
  - "刑夫"
  - "刑妻"
  - "男看财女看官"
  - "女看官杀男看财"

# 价值判断短语:即使没有性别色彩,也违反"命局只反映结构,不下价值结论"的承诺
forbidden_value_judgments:
  - "命不好"
  - "命差"
  - "命苦"
  - "孤寡命"
  - "短命"
  - "夭折"
