name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke:
    name: Smoke (deterministic + examples)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Pipeline smoke test
        run: |
          mkdir -p output
          python scripts/solve_bazi.py \
            --pillars "з”Іеӯҗ дёҒеҚҜ дёҷеҜ… жҲҠжҲҢ" \
            --gender M --birth-year 1984 \
            --orientation hetero \
            --out output/ci.bazi.json
          python scripts/score_curves.py \
            --bazi output/ci.bazi.json \
            --out output/ci.curves.json --age-end 80
          python scripts/render_artifact.py \
            --curves output/ci.curves.json \
            --out output/ci.html

      - name: Determinism check (bit-for-bit)
        run: |
          A=$(python scripts/score_curves.py --bazi output/ci.bazi.json --strict 2>/dev/null | sha256sum)
          B=$(python scripts/score_curves.py --bazi output/ci.bazi.json --strict 2>/dev/null | sha256sum)
          echo "A=$A"
          echo "B=$B"
          [ "$A" = "$B" ] || (echo "::error::output is not deterministic" && exit 1)
